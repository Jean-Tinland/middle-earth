<!doctype html>
<html lang="en" data-build-version="6">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <!-- HTML Meta Tags -->
    <title>Middle-Earth Interactive Map</title>
    <meta
      name="description"
      content="Explore the interactive map of Middle-Earth, the legendary world created by J.R.R. Tolkien."
    />

    <!-- Mobile Meta Tags -->
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="theme-color" content="#100f0f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <!-- Facebook Meta Tags -->
    <meta property="og:url" content="https://middle-earth.jeantinland.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Middle-Earth Interactive Map" />
    <meta
      property="og:description"
      content="Explore the interactive map of Middle-Earth, the legendary world created by J.R.R. Tolkien."
    />
    <meta
      property="og:image"
      content="https://middle-earth.jeantinland.com/assets/images/preview.png"
    />

    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta property="twitter:domain" content="middle-earth.jeantinland.com" />
    <meta
      property="twitter:url"
      content="https://middle-earth.jeantinland.com/"
    />
    <meta name="twitter:title" content="Middle-Earth Interactive Map" />
    <meta
      name="twitter:description"
      content="Explore the interactive map of Middle-Earth, the legendary world created by J.R.R. Tolkien."
    />
    <meta
      name="twitter:image"
      content="https://middle-earth.jeantinland.com/assets/images/preview.png"
    />

    <link rel="canonical" href="https://github.com/Jean-Tinland/middle-earth" />
    <link rel="icon" type="image/svg+xml" href="./assets/images/favicon.svg" />
    <link rel="stylesheet" href="./core/styles/variables.css" />
    <link rel="stylesheet" href="./core/styles/reset.css" />
    <link rel="stylesheet" href="./core/styles/fonts.css" />
    <link rel="stylesheet" href="./core/styles/base.css" />
  </head>
  <body>
    <script
      type="module"
      src="./core/javascript/components/map-canvas.js"
    ></script>
    <script>
      window.addEventListener(
        "load",
        async () => {
          await customElements.whenDefined("map-canvas");
          document.body.appendChild(document.createElement("map-canvas"));
        },
        { once: true },
      );
    </script>
  </body>
</html>
