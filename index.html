  <body>
    <main id="app" role="main" aria-label="Middle-Earth Interactive Map">
      <h1 class="sr-only">Middle-Earth Interactive Map</h1>
      <p class="sr-only">
        Explore a hand-drawn, interactive map of Middle-earth with zoomable
        places, landmarks, and region names.
      </p>
    </main>

    <noscript>
      <style>
        html,
        body {
          overflow: auto;
          touch-action: auto;
          background: #f0e8d7;
          color: #100f0f;
          font-family: "IM Fell DW Pica", serif;
          line-height: 1.5;
        }

        .noscript-content {
          max-width: 760px;
          margin: 0 auto;
          padding: 24px;
        }

        .noscript-content h1,
        .noscript-content h2 {
          margin: 16px 0 10px;
        }

        .noscript-content p,
        .noscript-content li {
          margin: 0 0 10px;
        }

        .noscript-content ul {
          list-style: disc;
          padding-left: 20px;
        }

        .noscript-content a {
          text-decoration: underline;
        }
      </style>

      <main class="noscript-content">
        <h1>Middle-Earth Interactive Map</h1>
        <p>
          This unofficial fan-made project lets you explore Middle-earth at the
          end of the Third Age with zoomable points of interest, labels, and
          source filtering.
        </p>
        <p>JavaScript is required to use the interactive map.</p>

        <h2>Useful links</h2>
        <ul>
          <li><a href="/about.html">About, methodology, and FAQ</a></li>
          <li>
            <a href="https://www.jeantinland.com/journal/lotr/"
              >Project journal</a
            >
          </li>
          <li>
            <a href="https://github.com/Jean-Tinland/middle-earth/"
              >Source code repository</a
            >
          </li>
        </ul>
      </main>
    </noscript>

    <script
      type="module"
      src="./core/javascript/components/map-canvas.js"
    ></script>
    <script>
      window.addEventListener(
        "load",
        async () => {
          await customElements.whenDefined("map-canvas");
          const appRoot = document.getElementById("app");
          if (appRoot) {
            appRoot.appendChild(document.createElement("map-canvas"));
          }
        },
        { once: true },
      );
    </script>
  </body>
</html>
